<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TraceIQ — AI Trace Analysis</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #f8f9fa;
    --surface: #ffffff;
    --surface-hover: #f5f5f5;
    --border: #e5e7eb;
    --border-subtle: #f0f0f0;
    --text: #111827;
    --text-secondary: #6b7280;
    --text-muted: #9ca3af;

    --green: #16a34a;
    --green-bg: #f0fdf4;
    --green-border: #bbf7d0;
    --green-badge: #dcfce7;

    --red: #dc2626;
    --red-bg: #fef2f2;
    --red-border: #fecaca;
    --red-badge: #fee2e2;

    --orange: #d97706;
    --orange-bg: #fffbeb;
    --orange-border: #fde68a;
    --orange-badge: #fef3c7;

    --blue: #2563eb;
    --blue-bg: #eff6ff;
    --blue-border: #bfdbfe;
    --blue-badge: #dbeafe;

    --purple: #7c3aed;
    --purple-bg: #f5f3ff;
    --purple-badge: #ede9fe;

    --new-glow: 0 0 0 2px #bfdbfe, 0 4px 16px rgba(37, 99, 235, 0.1);

    --radius: 12px;
    --radius-sm: 8px;
    --radius-xs: 6px;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.08), 0 1px 3px rgba(0,0,0,0.04);
    --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --mono: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Layout ───────────────────────────────────── */
  .page {
    max-width: 760px;
    margin: 0 auto;
    padding: 0 24px 80px;
  }

  /* ── Header ───────────────────────────────────── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 24px 0 0;
    gap: 16px;
    flex-wrap: wrap;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 8px;
    text-decoration: none;
    color: var(--text);
  }

  .logo-mark {
    width: 28px;
    height: 28px;
    background: var(--text);
    border-radius: 7px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo-mark svg {
    width: 16px;
    height: 16px;
    fill: white;
  }

  .logo-text {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.02em;
  }

  .separator {
    width: 1px;
    height: 18px;
    background: var(--border);
  }

  .project-name {
    font-size: 14px;
    color: var(--text-secondary);
    font-weight: 500;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .live-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--green-bg);
    border: 1px solid var(--green-border);
    color: var(--green);
    font-size: 12px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 20px;
    letter-spacing: 0.01em;
  }

  .live-dot {
    width: 6px;
    height: 6px;
    background: var(--green);
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .trace-count {
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 500;
  }

  .load-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-secondary);
    font-size: 13px;
    font-weight: 500;
    padding: 6px 12px;
    border-radius: var(--radius-xs);
    cursor: pointer;
    font-family: var(--font);
    transition: all 0.15s;
  }

  .load-btn:hover {
    background: var(--surface-hover);
    border-color: #d1d5db;
    color: var(--text);
  }

  .load-btn svg {
    width: 14px;
    height: 14px;
  }

  /* ── New Visits Banner ────────────────────────── */
  .new-banner {
    display: none;
    margin: 20px 0 0;
    background: var(--blue-bg);
    border: 1px solid var(--blue-border);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    font-size: 13px;
    color: var(--blue);
    font-weight: 500;
    align-items: center;
    gap: 8px;
  }

  .new-banner.visible {
    display: flex;
  }

  .new-banner svg {
    width: 14px;
    height: 14px;
    flex-shrink: 0;
  }

  .new-banner-dismiss {
    margin-left: auto;
    background: none;
    border: none;
    color: var(--blue);
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    opacity: 0.6;
    padding: 0 2px;
    font-family: var(--font);
  }

  .new-banner-dismiss:hover {
    opacity: 1;
  }

  /* ── Headline ─────────────────────────────────── */
  .headline-block {
    margin-top: 32px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px 32px;
    box-shadow: var(--shadow);
  }

  .headline-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .headline-text {
    font-size: 20px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.4;
    letter-spacing: -0.02em;
  }

  .headline-meta {
    margin-top: 14px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }

  .meta-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 13px;
    color: var(--text-muted);
  }

  .meta-item svg {
    width: 13px;
    height: 13px;
  }

  /* ── Section ──────────────────────────────────── */
  .section {
    margin-top: 32px;
  }

  .section-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }

  .section-icon {
    width: 22px;
    height: 22px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .section-icon svg {
    width: 12px;
    height: 12px;
  }

  .section-icon.green { background: var(--green-badge); }
  .section-icon.green svg { color: var(--green); }
  .section-icon.red { background: var(--red-badge); }
  .section-icon.red svg { color: var(--red); }
  .section-icon.orange { background: var(--orange-badge); }
  .section-icon.orange svg { color: var(--orange); }

  .section-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.01em;
  }

  .section-count {
    font-size: 12px;
    color: var(--text-muted);
    background: var(--border-subtle);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 1px 8px;
    font-weight: 500;
  }

  /* ── Cards ────────────────────────────────────── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    margin-bottom: 10px;
    overflow: hidden;
    transition: box-shadow 0.15s;
  }

  .card:hover {
    box-shadow: var(--shadow-md);
  }

  .card.new-insight {
    box-shadow: var(--new-glow);
    border-color: var(--blue-border);
  }

  .card-main {
    padding: 16px 20px;
    cursor: pointer;
    display: flex;
    align-items: flex-start;
    gap: 14px;
    user-select: none;
  }

  .card-accent {
    width: 3px;
    border-radius: 2px;
    flex-shrink: 0;
    align-self: stretch;
    min-height: 20px;
  }

  .card-accent.green { background: var(--green); }
  .card-accent.red { background: var(--red); }
  .card-accent.orange { background: var(--orange); }
  .card-accent.blue { background: var(--blue); }

  .card-body {
    flex: 1;
    min-width: 0;
  }

  .card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
  }

  .card-summary {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.5;
    letter-spacing: -0.01em;
  }

  .card-chevron {
    flex-shrink: 0;
    color: var(--text-muted);
    transition: transform 0.2s;
    margin-top: 2px;
  }

  .card-chevron svg {
    width: 16px;
    height: 16px;
  }

  .card.expanded .card-chevron {
    transform: rotate(180deg);
  }

  .card-footer {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 10px;
    flex-wrap: wrap;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 4px;
    letter-spacing: 0.02em;
    text-transform: uppercase;
  }

  .badge-high {
    background: var(--red-badge);
    color: var(--red);
  }

  .badge-medium {
    background: var(--orange-badge);
    color: var(--orange);
  }

  .badge-low {
    background: var(--blue-badge);
    color: var(--blue);
  }

  .badge-new {
    background: var(--blue-badge);
    color: var(--blue);
  }

  .direction-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 12px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 4px;
  }

  .direction-worse {
    background: var(--red-badge);
    color: var(--red);
  }

  .direction-better {
    background: var(--green-badge);
    color: var(--green);
  }

  .since-label {
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 500;
  }

  /* ── Card Expanded ────────────────────────────── */
  .card-details {
    display: none;
    padding: 0 20px 20px 37px;
    border-top: 1px solid var(--border-subtle);
  }

  .card.expanded .card-details {
    display: block;
  }

  .details-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin: 14px 0 8px;
  }

  .trace-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .trace-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .trace-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }

  .trace-id {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    font-family: var(--mono);
    letter-spacing: 0.02em;
  }

  .trace-time {
    font-size: 11px;
    color: var(--text-muted);
  }

  .trace-link {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    font-weight: 600;
    color: var(--blue);
    text-decoration: none;
    padding: 3px 8px;
    background: var(--blue-bg);
    border: 1px solid var(--blue-border);
    border-radius: 4px;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .trace-link:hover {
    background: var(--blue-border);
  }

  .trace-link svg {
    width: 10px;
    height: 10px;
  }

  .snippet-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  @media (max-width: 540px) {
    .snippet-row { grid-template-columns: 1fr; }
  }

  .snippet-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 10px;
  }

  .snippet-title {
    font-size: 10px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 4px;
  }

  .snippet-text {
    font-size: 12px;
    color: var(--text-secondary);
    line-height: 1.5;
    font-family: var(--mono);
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* ── Empty state ──────────────────────────────── */
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-muted);
    font-size: 14px;
  }

  /* ── Footer ───────────────────────────────────── */
  .footer {
    margin-top: 64px;
    padding: 24px 0;
    border-top: 1px solid var(--border);
    text-align: center;
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.6;
  }

  .footer span {
    color: var(--text-secondary);
  }

  /* ── Loading state ────────────────────────────── */
  .loading-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--text-muted);
  }

  .loading-spinner {
    width: 20px;
    height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--text-secondary);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* ── Error state ──────────────────────────────── */
  .error-state {
    background: var(--red-bg);
    border: 1px solid var(--red-border);
    border-radius: var(--radius);
    padding: 20px 24px;
    margin-top: 32px;
    font-size: 14px;
    color: var(--red);
  }

  .error-state strong {
    display: block;
    margin-bottom: 4px;
  }

  /* ── Divider ──────────────────────────────────── */
  .divider {
    height: 1px;
    background: var(--border-subtle);
    margin: 28px 0 0;
  }

  /* hidden file input */
  #file-input { display: none; }
</style>
</head>
<body>
<div class="page">

  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <a class="logo" href="#">
        <div class="logo-mark">
          <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
            <path d="M2 4h12v1.5H2V4zm0 3.5h8v1.5H2V7.5zm0 3.5h10v1.5H2V11z"/>
          </svg>
        </div>
        <span class="logo-text">TraceIQ</span>
      </a>
      <div class="separator"></div>
      <span class="project-name" id="project-name">—</span>
    </div>
    <div class="header-right">
      <span class="trace-count" id="trace-count"></span>
      <div class="live-badge">
        <div class="live-dot"></div>
        Live Data
      </div>
      <button class="load-btn" onclick="document.getElementById('file-input').click()">
        <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" xmlns="http://www.w3.org/2000/svg">
          <path d="M7 1v8M4 6l3 3 3-3M1 10v1.5A1.5 1.5 0 002.5 13h9A1.5 1.5 0 0013 11.5V10" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Load Report
      </button>
      <input type="file" id="file-input" accept=".json" onchange="handleFileUpload(event)">
    </div>
  </header>

  <!-- New visits banner -->
  <div class="new-banner" id="new-banner">
    <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" xmlns="http://www.w3.org/2000/svg">
      <circle cx="7" cy="7" r="6"/>
      <path d="M7 4v3.5l2 1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span id="new-banner-text"></span>
    <button class="new-banner-dismiss" onclick="dismissBanner()">×</button>
  </div>

  <!-- Main content -->
  <main id="main-content">
    <div class="loading-state" id="loading">
      <div class="loading-spinner"></div>
      Loading report…
    </div>
  </main>

</div>

<footer>
  <div class="page">
    <div class="footer">
      <span>TraceIQ</span> · AI Trace Analysis · Built for teams shipping AI in production
    </div>
  </div>
</footer>

<script>
// ── Utilities ──────────────────────────────────────────────────────────────

function formatDate(iso) {
  const d = new Date(iso);
  const now = new Date();
  const diff = now - d;
  const days = Math.floor(diff / 86400000);
  if (days === 0) return 'today';
  if (days === 1) return 'yesterday';
  if (days < 7) return `${days} days ago`;
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function formatTs(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ── localStorage visit tracking ────────────────────────────────────────────

const LAST_VISIT_KEY = 'traceiq_last_visit';
const LAST_SNAPSHOT_KEY = 'traceiq_last_snapshot';

function getLastVisit() {
  const ts = localStorage.getItem(LAST_VISIT_KEY);
  return ts ? new Date(ts) : null;
}

function recordVisit(snapshotId) {
  localStorage.setItem(LAST_VISIT_KEY, new Date().toISOString());
  localStorage.setItem(LAST_SNAPSHOT_KEY, snapshotId || '');
}

function isNewInsight(sinceIso, lastVisit) {
  if (!lastVisit) return false;
  return new Date(sinceIso) > lastVisit;
}

// ── Card toggle ────────────────────────────────────────────────────────────

function toggleCard(el) {
  el.closest('.card').classList.toggle('expanded');
}

// ── Render helpers ─────────────────────────────────────────────────────────

function renderTraceList(traceIds, traces) {
  if (!traceIds || traceIds.length === 0) return '<p style="font-size:13px;color:var(--text-muted)">No traces linked.</p>';

  return `<div class="trace-list">` + traceIds.map(id => {
    const t = traces[id];
    if (!t) return '';
    return `
      <div class="trace-card">
        <div class="trace-header">
          <span class="trace-id">${escapeHtml(id)}</span>
          <div style="display:flex;align-items:center;gap:8px;">
            <span class="trace-time">${formatTs(t.timestamp)}</span>
            ${t.url ? `<a class="trace-link" href="${escapeHtml(t.url)}" target="_blank" rel="noopener">
              View in LangSmith
              <svg viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5" xmlns="http://www.w3.org/2000/svg">
                <path d="M2 8L8 2M5 2h3v3" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </a>` : ''}
          </div>
        </div>
        <div class="snippet-row">
          <div class="snippet-block">
            <div class="snippet-title">Input</div>
            <div class="snippet-text">${escapeHtml(t.input_snippet || '—')}</div>
          </div>
          <div class="snippet-block">
            <div class="snippet-title">Output</div>
            <div class="snippet-text">${escapeHtml(t.output_snippet || '—')}</div>
          </div>
        </div>
      </div>`;
  }).join('') + `</div>`;
}

function renderCard(insight, accentColor, badgeHtml, traces, isNew) {
  const sinceText = insight.since ? `Since ${formatDate(insight.since)}` : '';
  const newBadge = isNew ? `<span class="badge badge-new">New</span>` : '';
  const traceCount = insight.trace_ids ? insight.trace_ids.length : 0;

  return `
    <div class="card${isNew ? ' new-insight' : ''}">
      <div class="card-main" onclick="toggleCard(this)">
        <div class="card-accent ${accentColor}"></div>
        <div class="card-body">
          <div class="card-top">
            <div class="card-summary">${escapeHtml(insight.summary)}</div>
            <div class="card-chevron">
              <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" xmlns="http://www.w3.org/2000/svg">
                <path d="M4 6l4 4 4-4" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
          </div>
          <div class="card-footer">
            ${badgeHtml}
            ${newBadge}
            ${sinceText ? `<span class="since-label">${escapeHtml(sinceText)}</span>` : ''}
            ${traceCount > 0 ? `<span class="since-label" style="margin-left:auto">${traceCount} trace${traceCount !== 1 ? 's' : ''}</span>` : ''}
          </div>
        </div>
      </div>
      <div class="card-details">
        <div class="details-label">Supporting Traces</div>
        ${renderTraceList(insight.trace_ids, traces)}
      </div>
    </div>`;
}

function renderSection(title, iconClass, iconSvg, insights, accentColor, badgeFn, traces, lastVisit) {
  if (!insights || insights.length === 0) return '';

  const cards = insights.map(insight => {
    const isNew = isNewInsight(insight.since, lastVisit);
    return renderCard(insight, accentColor, badgeFn(insight), traces, isNew);
  }).join('');

  return `
    <div class="section">
      <div class="section-header">
        <div class="section-icon ${iconClass}">
          <svg viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg" stroke="currentColor" stroke-width="1.5">
            ${iconSvg}
          </svg>
        </div>
        <span class="section-title">${title}</span>
        <span class="section-count">${insights.length}</span>
      </div>
      ${cards}
    </div>`;
}

// ── Main render ────────────────────────────────────────────────────────────

function renderDashboard(data) {
  const lastVisit = getLastVisit();
  const traces = data.traces || {};
  const insights = data.insights || {};

  // Count new insights
  const allInsights = [
    ...(insights.working || []),
    ...(insights.broken || []),
    ...(insights.changed || []),
  ];
  const newCount = lastVisit
    ? allInsights.filter(i => i.since && isNewInsight(i.since, lastVisit)).length
    : 0;

  // Banner
  if (newCount > 0) {
    const banner = document.getElementById('new-banner');
    const bannerText = document.getElementById('new-banner-text');
    bannerText.textContent = `${newCount} new insight${newCount !== 1 ? 's' : ''} since your last visit`;
    banner.classList.add('visible');
  }

  // Header meta
  document.getElementById('project-name').textContent = (data.project || '').replace(/_/g, ' ');
  if (data.trace_count_analyzed) {
    document.getElementById('trace-count').textContent = `${data.trace_count_analyzed} traces analyzed`;
  }

  // Build HTML
  const headline = `
    <div class="headline-block">
      <div class="headline-label">State of the Agent</div>
      <div class="headline-text" id="headline-text">${escapeHtml(data.headline || 'No headline available.')}</div>
      <div class="headline-meta">
        <div class="meta-item">
          <svg viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.5" xmlns="http://www.w3.org/2000/svg">
            <circle cx="6.5" cy="6.5" r="5.5"/>
            <path d="M6.5 3.5v3.5l2 1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Generated ${formatDate(data.generated_at || new Date().toISOString())}
        </div>
        ${data.snapshot_id ? `<div class="meta-item">
          <svg viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.5" xmlns="http://www.w3.org/2000/svg">
            <rect x="1" y="1" width="11" height="11" rx="2"/>
            <path d="M4 4h5M4 6.5h5M4 9h3" stroke-linecap="round"/>
          </svg>
          ${escapeHtml(data.snapshot_id)}
        </div>` : ''}
      </div>
    </div>`;

  const workingSection = renderSection(
    'What is working', 'green',
    '<path d="M2 6l3 3 5-5" stroke-linecap="round" stroke-linejoin="round"/>',
    insights.working, 'green',
    () => '', traces, lastVisit
  );

  const brokenSection = renderSection(
    'What is broken', 'red',
    '<path d="M6 2v4.5M6 9.5v.5" stroke-linecap="round"/><circle cx="6" cy="6" r="5"/>',
    insights.broken, 'red',
    (insight) => {
      const sev = insight.severity;
      if (!sev) return '';
      return `<span class="badge badge-${sev}">${sev}</span>`;
    }, traces, lastVisit
  );

  const changedSection = renderSection(
    'What changed', 'orange',
    '<path d="M6 2v8M9 5L6 2 3 5M9 9l-3 3-3-3" stroke-linecap="round" stroke-linejoin="round"/>',
    insights.changed, (i) => i.direction === 'better' ? 'blue' : 'orange',
    (insight) => {
      if (!insight.direction) return '';
      const cls = insight.direction === 'better' ? 'direction-better' : 'direction-worse';
      const arrow = insight.direction === 'better' ? '↑ Better' : '↓ Worse';
      return `<span class="direction-badge ${cls}">${arrow}</span>`;
    }, traces, lastVisit
  );

  // For changed section we need per-card accent — override to handle per-insight
  const changedSectionRendered = renderChangedSection(insights.changed, traces, lastVisit);

  document.getElementById('main-content').innerHTML = `
    ${headline}
    ${workingSection}
    ${brokenSection}
    ${changedSectionRendered}
  `;

  // Record visit after rendering (so "new" counts are shown first)
  recordVisit(data.snapshot_id);
}

function renderChangedSection(insights, traces, lastVisit) {
  if (!insights || insights.length === 0) return '';

  const cards = insights.map(insight => {
    const isNew = isNewInsight(insight.since, lastVisit);
    const accentColor = insight.direction === 'better' ? 'blue' : 'orange';
    const badgeHtml = insight.direction
      ? `<span class="direction-badge ${insight.direction === 'better' ? 'direction-better' : 'direction-worse'}">${insight.direction === 'better' ? '↑ Better' : '↓ Worse'}</span>`
      : '';
    return renderCard(insight, accentColor, badgeHtml, traces, isNew);
  }).join('');

  return `
    <div class="section">
      <div class="section-header">
        <div class="section-icon orange">
          <svg viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg" stroke="currentColor" stroke-width="1.5">
            <path d="M6 1v10M2 4l4-3 4 3M2 8l4 3 4-3" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="section-title">What changed</span>
        <span class="section-count">${insights.length}</span>
      </div>
      ${cards}
    </div>`;
}

// ── File upload ────────────────────────────────────────────────────────────

function handleFileUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      renderDashboard(data);
    } catch (err) {
      showError('Invalid JSON file: ' + err.message);
    }
  };
  reader.readAsText(file);
  // reset so same file can be reloaded
  event.target.value = '';
}

function showError(msg) {
  document.getElementById('main-content').innerHTML = `
    <div class="error-state">
      <strong>Failed to load report</strong>
      ${escapeHtml(msg)}
    </div>`;
}

function dismissBanner() {
  document.getElementById('new-banner').classList.remove('visible');
}

// ── Boot: load data ────────────────────────────────────────────────────────

async function loadData() {
  // Try insights_output.json first, then fall back to mock_insights.json
  const sources = ['insights_output.json', 'mock_insights.json'];
  for (const src of sources) {
    try {
      const res = await fetch(src);
      if (!res.ok) continue;
      const data = await res.json();
      renderDashboard(data);
      return;
    } catch (_) {
      // try next
    }
  }
  showError('Could not load insights_output.json or mock_insights.json. Use "Load Report" to upload a file manually.');
}

loadData();
</script>

</html>
